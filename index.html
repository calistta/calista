<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALISTA - Мастерица безопасного пирсинга и художественной татуировки</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap');

        @font-face {
            font-family: 'Levaus';
            src: url('./fonts/Levaus.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Italian Old Antiqua';
            src: url('./fonts/GoudyOldStyleItalic.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }
        
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 20, 20, 0.8);
            filter: blur(4px) brightness(0.6);
            z-index: -1;
        }
        
        .container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            background: url('fon_calista3.jpg') center/cover no-repeat;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .header {
            position: relative;
            margin-bottom: 1rem;
        }
        
        .avatar-container {
            position: relative;
            margin-bottom: 1rem;
        }
        
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff6b6b46;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }
        
        .avatar:hover {
            transform: scale(1.05);
        }
        
        .name {
            font-family: 'Levaus', serif;
            font-size: 25px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            position: relative;
            display: inline-block;
        }
        
        .name-ru {
            font-family: 'Italian Old Antiqua', serif;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            position: relative;
            display: inline-block;
        }

        .tagline {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: #aaa;
            font-weight: 300;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .section {
            width: 100%;
            margin: 1.5rem 0;
        }
        
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #fff;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(rgba(255, 107, 107, 0.3));
            border-radius: 10px;
        }
        
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
            margin: 0.5rem 0;
            font-weight: 500;
        }
        
        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 107, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .button:hover::before {
            left: 100%;
        }
        
        .button:hover {
            background: rgba(255, 107, 107, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 107, 107, 0.5);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .star {
            position: absolute;
            font-size: 1.5rem;
            color: #ff6b6b;
            animation: twinkle 2s infinite;
        }
        
        .star:nth-child(1) {
            top: 10px;
            right: 10px;
        }
        
        .star:nth-child(2) {
            bottom: 10px;
            left: 10px;
        }
        
        .star:nth-child(3) {
            top: 50%;
            right: 10px;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #888;
            text-align: center;
        }
        
        .location {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 0.5rem;
            font-weight: 300;
        }
        
        @media (min-width: 768px) {
            .container {
                max-width: 500px;
                margin: 3rem auto;
                padding: 3rem;
            }
            
            .avatar {
                width: 200px;
                height: 200px;
            }
            
            .name {
                font-size: 30px;
            }

            .name-ru {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="header">
            <div class="avatar-container">
                <img src="ava.jpg" alt="Аватарка" class="avatar">
            </div>
            <h1 class="name-ru">КАЛИСТА</h1><br>
            <h1 class="name">CALISTA</h1>
            <p class="tagline">Мастерица безопасного пирсинга в Армавире  <img style="display: block; margin: 0 auto;" src="smile.png"></p>
        </div>
        
        <div class="section">
            <h2 class="section-title">ОТЗЫВЫ</h2>
            <a href="https://2gis.ru/armawir/geo/70000001105289882" class="button" target="_blank">
                Читать отзывы
            </a>
        </div>
        
        <div class="section">
            <h2 class="section-title">КОНТАКТЫ</h2>
            <a href="https://t.me/calisttaaa" class="button" target="_blank">
                ТЕЛЕГРАММ
            </a>
            <a href="https://t.me/CALIISTTA" class="button" target="_blank">
                Мой канал в Telegram
            </a>
            <a href="https://vk.com/calisttaaa" class="button" target="_blank">
                Группа в VK
            </a>
            <a href="https://www.instagram.com/calistaa.pierce?igsh=dHEwMWQ3ZmxuYzJo&utm_source=qr" class="button" target="_blank">
                Мой Instagram
            </a>
        </div>
        
        <div class="location">
            Комсомольская улица, 129, Центр м-н, Армавир, Краснодарский край, 352900
        </div>
        
        <div class="footer">
            © 2025 CALISTA. Студия безопасного пирсинга.
        </div>
    </div>
</body>
</html>
